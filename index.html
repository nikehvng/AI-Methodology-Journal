<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-LearnHub | KI Methoden & Anwendungen</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --sidebar: #1e1b4b;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        nav { width: 280px; background: var(--sidebar); color: white; padding: 2rem 1.5rem; display: flex; flex-direction: column; flex-shrink: 0; }
        nav h2 { color: #a5b4fc; font-size: 1.4rem; margin-bottom: 2rem; border-bottom: 1px solid #312e81; padding-bottom: 1rem; }
        .nav-stats { font-size: 0.85rem; color: #94a3b8; margin-bottom: 2rem; line-height: 1.6; }
        .nav-stats i { width: 20px; color: #a5b4fc; }

        /* Main Content */
        main { flex: 1; padding: 2rem; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        h3 { margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 1.1rem; }

        /* Form Elements */
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-dark); }
        .ai-link { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; text-decoration: none; text-align: center; padding: 12px; border-radius: 10px; margin-top: auto; font-weight: bold; }

        /* Spaced Repetition Flashcards */
        .flashcard-container { perspective: 1000px; height: 220px; cursor: pointer; margin: 15px 0; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; border-radius: 12px; 
            border: 2px solid #e2e8f0; padding: 25px; text-align: center; font-size: 1rem;
        }
        .card-back { background: #f5f3ff; color: var(--primary); transform: rotateY(180deg); font-weight: 500; }
        
        .rating-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; display: none; }
        .btn-rate { border: none; color: white; padding: 10px 5px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; }
        
        /* Notes & Uploads */
        .file-zone { border: 2px dashed #cbd5e1; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; margin-bottom: 10px; color: var(--secondary); font-size: 0.9rem; }
        .preview-img { max-width: 60px; border-radius: 4px; margin-top: 5px; }
        .note-item { background: #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; position: relative; border-left: 4px solid var(--primary); }
        .delete-icon { position: absolute; right: 10px; top: 10px; color: var(--danger); cursor: pointer; opacity: 0.6; }
        .delete-icon:hover { opacity: 1; }

        /* Simple Calendar */
        .event-item { font-size: 0.85rem; padding: 5px 0; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <nav>
        <h2>AI-LearnHub</h2>
        <div class="nav-stats">
            <div><i class="fas fa-layer-group"></i> Karten: <span id="stat-total">0</span></div>
            <div><i class="fas fa-clock"></i> Fällig: <span id="stat-due">0</span></div>
            <div><i class="fas fa-sticky-note"></i> Notizen: <span id="stat-notes">0</span></div>
        </div>
        
        <div style="margin-bottom: 2rem;">
            <p style="font-size: 0.8rem; color: #a5b4fc; text-transform: uppercase;">Kalender-Quickies</p>
            <div id="calendar-mini"></div>
        </div>

        <a href="https://chatgpt.com" target="_blank" class="ai-link">
            <i class="fas fa-robot"></i> KI-Assistent fragen
        </a>
    </nav>

    <main>
        <header style="margin-bottom: 2rem;">
            <h1 style="margin:0;">KI Methoden & Anwendungen</h1>
            <small id="status-msg" style="color: var(--primary); font-weight: bold;"></small>
        </header>

        <div class="grid">
            <div class="col">
                <div class="card">
                    <h3><i class="fas fa-pen-fancy"></i> Vorlesung zusammenfassen</h3>
                    <input type="text" id="noteTitle" placeholder="Thema (z.B. Neuronale Netze)">
                    <textarea id="noteText" placeholder="Inhalt der Vorlesung..."></textarea>
                    <div class="file-zone" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-image"></i> Bild/Datei hinzufügen
                        <input type="file" id="fileInput" hidden onchange="handleFilePreview(this)">
                        <div id="filePreview"></div>
                    </div>
                    <button class="btn btn-primary" onclick="saveNote()">Hinterlegen</button>
                </div>

                <div class="card">
                    <h3><i class="fas fa-calendar-day"></i> Prüfungstermine</h3>
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <input type="date" id="eventDate" style="margin:0; flex:1;">
                        <input type="text" id="eventText" placeholder="Was steht an?" style="margin:0; flex:2;">
                        <button class="btn btn-primary" onclick="addEvent()" style="width:auto;"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="eventList"></div>
                </div>

                <div class="card" style="max-height: 300px; overflow-y: auto;">
                    <h3><i class="fas fa-history"></i> Letzte Notizen</h3>
                    <div id="notesContainer"></div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <h3><i class="fas fa-plus-square"></i> Neue Karte erstellen (Anki)</h3>
                    <input type="text" id="ankiFront" placeholder="Frage auf der Vorderseite">
                    <textarea id="ankiBack" placeholder="Antwort auf der Rückseite"></textarea>
                    <button class="btn btn-primary" onclick="addAnkiCard()">In den Stapel legen</button>
                </div>

                <div class="card" id="studyCard">
                    <h3><i class="fas fa-brain"></i> Lernen (Spaced Repetition)</h3>
                    <div id="ankiDisplay">
                        <div class="flashcard-container" id="f-container" onclick="this.classList.toggle('flipped')">
                            <div class="flashcard-inner">
                                <div class="card-front" id="dispFront">Starte eine Lernsession!</div>
                                <div class="card-back" id="dispBack">Hier steht die Lösung.</div>
                            </div>
                        </div>
                        <button id="btnNext" class="btn btn-primary" onclick="loadNextCard()">Nächste fällige Karte</button>
                        
                        <div class="rating-btns" id="rateSection">
                            <button class="btn-rate" style="background:#ef4444" onclick="rate(1)">Sehr Schwer<br>1m</button>
                            <button class="btn-rate" style="background:#f59e0b" onclick="rate(10)">Schwer<br>10m</button>
                            <button class="btn-rate" style="background:#4f46e5" onclick="rate(1440)">Mittel<br>1 Tag</button>
                            <button class="btn-rate" style="background:#10b981" onclick="rate(4320)">Leicht<br>3 Tage</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Daten aus LocalStorage laden
        let notes = JSON.parse(localStorage.getItem('ki_notes') || '[]');
        let anki = JSON.parse(localStorage.getItem('ki_anki') || '[]');
        let events = JSON.parse(localStorage.getItem('ki_events') || '[]');
        let currentAnkiIndex = -1;

        // Init
        window.onload = () => {
            renderNotes();
            renderEvents();
            updateStats();
        };

        // --- NOTIZEN LOGIK ---
        function saveNote() {
            const title = document.getElementById('noteTitle').value;
            const text = document.getElementById('noteText').value;
            if(!title) return;

            notes.unshift({ title, text, date: new Date().toLocaleDateString(), id: Date.now() });
            localStorage.setItem('ki_notes', JSON.stringify(notes));
            
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteText').value = '';
            document.getElementById('filePreview').innerHTML = '';
            renderNotes();
            updateStats();
            showStatus("Notiz gespeichert!");
        }

        function renderNotes() {
            const container = document.getElementById('notesContainer');
            container.innerHTML = notes.map(n => `
                <div class="note-item">
                    <i class="fas fa-trash delete-icon" onclick="deleteNote(${n.id})"></i>
                    <strong>${n.title}</strong><br><small>${n.text}</small>
                </div>
            `).join('');
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('ki_notes', JSON.stringify(notes));
            renderNotes();
            updateStats();
        }

        function handleFilePreview(input) {
            const preview = document.getElementById('filePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => preview.innerHTML = `<img src="${e.target.result}" class="preview-img">`;
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- ANKI LOGIK (SPACED REPETITION) ---
        function addAnkiCard() {
            const front = document.getElementById('ankiFront').value;
            const back = document.getElementById('ankiBack').value;
            if(!front || !back) return;

            anki.push({ front, back, nextReview: Date.now(), id: Date.now() });
            localStorage.setItem('ki_anki', JSON.stringify(anki));
            
            document.getElementById('ankiFront').value = '';
            document.getElementById('ankiBack').value = '';
            updateStats();
            showStatus("Karteikarte erstellt!");
        }

        function loadNextCard() {
            const now = Date.now();
            const dueCards = anki.filter(c => c.nextReview <= now);
            
            if(dueCards.length === 0) {
                document.getElementById('dispFront').innerText = "Glückwunsch! Alles gelernt. 🎉";
                document.getElementById('dispBack').innerText = "Keine Karten mehr fällig.";
                return;
            }

            const card = dueCards[0];
            currentAnkiIndex = anki.indexOf(card);
            
            document.getElementById('dispFront').innerText = card.front;
            document.getElementById('dispBack').innerText = card.back;
            document.getElementById('f-container').classList.remove('flipped');
            document.getElementById('btnNext').style.display = "none";
            document.getElementById('rateSection').style.display = "grid";
        }

        function rate(minutes) {
            const nextReview = Date.now() + (minutes * 60 * 1000);
            anki[currentAnkiIndex].nextReview = nextReview;
            localStorage.setItem('ki_anki', JSON.stringify(anki));
            
            document.getElementById('rateSection').style.display = "none";
            document.getElementById('btnNext').style.display = "block";
            updateStats();
            loadNextCard();
        }

        // --- KALENDER LOGIK ---
        function addEvent() {
            const date = document.getElementById('eventDate').value;
            const text = document.getElementById('eventText').value;
            if(!date || !text) return;

            events.push({ date, text });
            events.sort((a,b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('ki_events', JSON.stringify(events));
            renderEvents();
        }

        function renderEvents() {
            const container = document.getElementById('eventList');
            container.innerHTML = events.map(e => `
                <div class="event-item"><strong>${e.date}:</strong> ${e.text}</div>
            `).join('');
        }

        // --- UTILS ---
        function updateStats() {
            document.getElementById('stat-total').innerText = anki.length;
            document.getElementById('stat-due').innerText = anki.filter(c => c.nextReview <= Date.now()).length;
            document.getElementById('stat-notes').innerText = notes.length;
        }

        function showStatus(msg) {
            const s = document.getElementById('status-msg');
            s.innerText = msg;
            setTimeout(() => s.innerText = "", 3000);
        }
    </script>
</body>
</html>
