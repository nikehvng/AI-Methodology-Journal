<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Lernplattform</title>
<style>
/* ======= Allgemeines Styling ======= */
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background-color: #121212;
  color: #f0f0f0;
}
.container {
  width: 90%;
  margin: auto;
  padding-bottom: 2rem;
}
header {
  text-align: center;
  padding: 2rem 0;
}
h1 { margin: 0; }

/* ======= Dashboard ======= */
.dashboard {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
}
.card {
  background-color: #1e1e1e;
  border-radius: 12px;
  padding: 1.5rem;
  flex: 1 1 300px;
  cursor: pointer;
  transition: transform 0.2s;
}
.card:hover { transform: scale(1.05); }
.card h2 { margin-top: 0; }
.card ul { list-style: none; padding-left: 0; }
.card ul li { margin: 0.5rem 0; }

/* ======= Vorlesungsseiten ======= */
.lecture-content, .quiz-section {
  display: none;
  background-color: #1e1e1e;
  border-radius: 12px;
  padding: 1.5rem;
  margin-top: 1rem;
}
.active { display: block; }

/* ======= Buttons ======= */
button {
  background-color: #6200ee;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 0.5rem 1rem;
  cursor: pointer;
  margin-top: 1rem;
}
button:hover { background-color: #3700b3; }

/* ======= Quiz Styling ======= */
.quiz-section ul { list-style: none; padding-left: 0; }
.quiz-section ul li { margin: 0.5rem 0; cursor: pointer; padding: 0.3rem 0.5rem; border-radius: 6px; }
.quiz-section ul li:hover { background-color: #333; }

/* ======= Back Button ======= */
.back-btn {
  background-color: #bb86fc;
  margin-top: 1rem;
}
.back-btn:hover { background-color: #3700b3; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>KI Methoden & Anwendungen</h1>
  </header>

  <!-- ======= Dashboard ======= -->
  <div class="dashboard" id="dashboard">
    <div class="card">
      <h2>Vorlesungen</h2>
      <ul>
        <li onclick="openLecture(0)">Warum Künstliche Intelligenz jetzt?</li>
        <li onclick="openLecture(1)">Maschinelles Lernen</li>
        <li onclick="openLecture(2)">Neuronale Netze</li>
        <li onclick="openLecture(3)">Natürliche Sprachverarbeitung</li>
        <li onclick="openLecture(4)">Computer Vision</li>
        <li onclick="openLecture(5)">Robotik</li>
        <li onclick="openLecture(6)">KI in der Praxis</li>
      </ul>
    </div>

    <div class="card">
      <h2>Was steht heute an?</h2>
      <ul id="spacedRepetitionList">
        <!-- Wird per JS befüllt -->
      </ul>
    </div>

    <div class="card">
      <h2>Quizzes</h2>
      <ul>
        <li onclick="openQuiz(0)">Quiz 1</li>
        <li onclick="openQuiz(1)">Quiz 2</li>
        <li onclick="openQuiz(2)">Quiz 3</li>
      </ul>
    </div>
  </div>

  <!-- ======= Vorlesungsinhalte ======= -->
  <div id="lectureContainer"></div>

  <!-- ======= Quiz Inhalte ======= -->
  <div id="quizContainer"></div>

</div>

<script>
// ======= Daten für Vorlesungen =======
const lectures = [
  {
    title: "Warum Künstliche Intelligenz jetzt?",
    intro: "KI hat in den letzten Jahren enorme Fortschritte gemacht.",
    explanation: "Künstliche Intelligenz umfasst Systeme, die Aufgaben lösen können, die typischerweise menschliche Intelligenz erfordern, z.B. maschinelles Lernen, Sprachverarbeitung, Bilderkennung.",
    merksatz: "KI ist überall – von Smartphones bis zur Industrieautomatisierung.",
    quiz: ["Welche Aufgaben kann KI erledigen?", "Sprachverarbeitung", "Bildklassifikation", "Mathematische Berechnungen", "Alle oben genannten", 4]
  },
  {
    title: "Maschinelles Lernen",
    intro: "Maschinelles Lernen ist ein Teilgebiet der KI.",
    explanation: "ML-Systeme lernen Muster aus Daten und treffen Vorhersagen oder Entscheidungen ohne explizite Programmierung.",
    merksatz: "Daten sind das Öl des maschinellen Lernens.",
    quiz: ["Was ist ML?", "Manuelles Programmieren", "Systeme lernen aus Daten", "Zufällige Entscheidungen", "Keine der Antworten", 2]
  },
  {
    title: "Neuronale Netze",
    intro: "Neuronale Netze sind inspiriert vom menschlichen Gehirn.",
    explanation: "Sie bestehen aus Neuronen-Schichten, die komplexe Muster und Zusammenhänge erkennen können.",
    merksatz: "Tiefe Netze lernen tiefe Muster.",
    quiz: ["Wofür werden neuronale Netze verwendet?", "Bilderkennung", "Sprachverarbeitung", "Alle Aufgaben der KI", "Keine", 3]
  },
  {
    title: "Natürliche Sprachverarbeitung",
    intro: "NLP ermöglicht Computern das Verstehen menschlicher Sprache.",
    explanation: "Anwendungen umfassen Chatbots, Übersetzungen und Textanalyse.",
    merksatz: "Sprache verstehen = KI verstehen.",
    quiz: ["Was ist NLP?", "Datenbankmanagement", "Sprachverarbeitung", "Hardwareentwicklung", "Keine", 2]
  },
  {
    title: "Computer Vision",
    intro: "Computer Vision analysiert Bilder und Videos.",
    explanation: "Anwendungen reichen von Gesichtserkennung bis autonomen Fahren.",
    merksatz: "Bilder sehen = Computer Vision.",
    quiz: ["Wofür wird Computer Vision genutzt?", "Gesichtserkennung", "Autonomes Fahren", "Alle visuellen Analysen", "Keine", 3]
  },
  {
    title: "Robotik",
    intro: "Robotik kombiniert KI und Maschinenbau.",
    explanation: "Roboter führen Aufgaben autonom oder halb-autonom aus.",
    merksatz: "Roboter + KI = autonome Systeme.",
    quiz: ["Robotik ist...", "Kunsthandwerk", "Automatisierung von Aufgaben", "Nur Industrie 4.0", "Keine", 2]
  },
  {
    title: "KI in der Praxis",
    intro: "KI wird in vielen Branchen eingesetzt.",
    explanation: "Von Medizin über Finanzen bis Industrie – KI verändert Prozesse und Entscheidungen.",
    merksatz: "Praxisnähe macht KI greifbar.",
    quiz: ["Wo wird KI angewendet?", "Medizin", "Finanzen", "Industrie", "Alle genannten", 4]
  }
];

// ======= Daten für Spaced Repetition =======
const todayTopics = [
  {name: "Warum Künstliche Intelligenz jetzt?", lastSeen: "2026-03-25"},
  {name: "Maschinelles Lernen", lastSeen: "2026-03-26"},
  {name: "Neuronale Netze", lastSeen: "2026-03-27"},
  {name: "Computer Vision", lastSeen: "2026-03-28"}
];
function showTodayTopics() {
  const list = document.getElementById('spacedRepetitionList');
  list.innerHTML = '';
  const today = new Date();
  todayTopics.forEach(t => {
    const last = new Date(t.lastSeen);
    const diff = Math.floor((today - last)/(1000*60*60*24));
    if(diff >= 1){
      const li = document.createElement('li');
      li.textContent = t.name;
      li.onclick = () => { 
        const index = lectures.findIndex(l => l.title === t.name);
        openLecture(index);
      };
      list.appendChild(li);
    }
  });
}
showTodayTopics();

// ======= Funktionen zum Anzeigen der Vorlesungen =======
function openLecture(index){
  const container = document.getElementById('lectureContainer');
  container.innerHTML = '';
  const lecture = lectures[index];
  const div = document.createElement('div');
  div.className = 'lecture-content active';
  div.innerHTML = `
    <h2>${lecture.title}</h2>
    <p><strong>Einleitung:</strong> ${lecture.intro}</p>
    <p><strong>Erklärung:</strong> ${lecture.explanation}</p>
    <p><strong>Merksatz:</strong> ${lecture.merksatz}</p>
    <button onclick="openQuiz(${index})">Zum Quiz</button>
    <button class="back-btn" onclick="backToDashboard()">Zurück zum Dashboard</button>
  `;
  container.appendChild(div);
  document.getElementById('dashboard').style.display = 'none';
}

// ======= Funktionen für Quizzes =======
function openQuiz(index){
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  const lecture = lectures[index];
  const div = document.createElement('div');
  div.className = 'quiz-section active';
  div.innerHTML = `
    <h2>Quiz: ${lecture.title}</h2>
    <p>${lecture.quiz[0]}</p>
    <ul>
      <li onclick="checkAnswer(this, ${lecture.quiz[5]})">${lecture.quiz[1]}</li>
      <li onclick="checkAnswer(this, ${lecture.quiz[5]})">${lecture.quiz[2]}</li>
      <li onclick="checkAnswer(this, ${lecture.quiz[5]})">${lecture.quiz[3]}</li>
      <li onclick="checkAnswer(this, ${lecture.quiz[5]})">${lecture.quiz[4]}</li>
    </ul>
    <button class="back-btn" onclick="backToDashboard()">Zurück zum Dashboard</button>
  `;
  container.appendChild(div);
  document.getElementById('dashboard').style.display = 'none';
}

function checkAnswer(element, correctIndex){
  const ul = element.parentNode;
  const items = Array.from(ul.children);
  items.forEach((li, i) => {
    if(i+1 === correctIndex) li.style.backgroundColor = 'green';
    else li.style.backgroundColor = 'red';
  });
}

// ======= Zurück zum Dashboard =======
function backToDashboard(){
  document.getElementById('lectureContainer').innerHTML = '';
  document.getElementById('quizContainer').innerHTML = '';
  document.getElementById('dashboard').style.display = 'flex';
}
</script>
</body>
</html>
