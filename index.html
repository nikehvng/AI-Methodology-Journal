<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-LearnHub Ultimate | SRS & Management Edition</title>

    <!-- Icons & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* =========================
           DESIGN SYSTEM
        ========================= */
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --bg: #f8fafc;
            --sidebar: #ffffff;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body.dark-mode {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            transition: background 0.3s, color 0.3s;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* =========================
           SIDEBAR
        ========================= */
        nav {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .nav-link {
            padding: 12px 15px;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        /* =========================
           MAIN AREA
        ========================= */
        main {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        /* =========================
           NOTE GRID
        ========================= */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .note-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 22px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        /* =========================
           SNAKE CANVAS
        ========================= */
        canvas {
            background: #222;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        button {
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- =========================
     SIDEBAR NAVIGATION
========================= -->
<nav>
    <div class="logo"><i class="fas fa-brain"></i> LearnHub</div>

    <div class="nav-link active" onclick="showSection('dashboard', this)">Dashboard</div>
    <div class="nav-link" onclick="showSection('notes', this)">Vorlesungen</div>
    <div class="nav-link" onclick="showSection('anki', this)">Anki</div>
    <div class="nav-link" onclick="showSection('quiz', this)">Quiz</div>
    <div class="nav-link" onclick="showSection('snake', this)">Snake</div>
</nav>

<!-- =========================
     MAIN CONTENT
========================= -->
<main>

    <!-- DASHBOARD -->
    <section id="dashboard" class="content-section active">
        <h1>Dashboard 🚀</h1>
        <div class="card">Dein Lernsystem läuft.</div>
    </section>

    <!-- NOTES -->
    <section id="notes" class="content-section">
        <h1>Notizen</h1>
        <div class="card">
            <input id="noteTitle" placeholder="Titel">
            <textarea id="noteText" placeholder="Text"></textarea>
            <button onclick="saveNote()">Speichern</button>
        </div>

        <div id="notesGrid" class="notes-grid"></div>
    </section>

    <!-- ANKI -->
    <section id="anki" class="content-section">
        <h1>Anki</h1>
        <div class="card">
            <input id="ankiFront" placeholder="Frage">
            <input id="ankiBack" placeholder="Antwort">
            <button onclick="saveAnki()">Speichern</button>
        </div>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="content-section">
        <h1>Quiz</h1>
        <div class="card">
            <button onclick="generateQuiz()">Start</button>
        </div>
    </section>

    <!-- =========================
         SNAKE GAME
    ========================= -->
    <section id="snake" class="content-section">
        <h1>Snake 🐍</h1>

        <div class="card" style="text-align:center; position:relative;">
            <div id="snake-score" style="position:absolute; top:10px; right:20px;">0</div>
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <p>Pfeiltasten zum Spielen | Space = Pause</p>
        </div>
    </section>

</main>

<script>
/* =========================
   STORAGE
========================= */
let notes = JSON.parse(localStorage.getItem("notes") || "[]");
let anki = JSON.parse(localStorage.getItem("anki") || "[]");

/* =========================
   NAVIGATION
========================= */
function showSection(id, el) {
    document.querySelectorAll(".content-section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
    el.classList.add("active");

    if (id === "snake") initSnake();
}

/* =========================
   NOTES SYSTEM
========================= */
function saveNote() {
    const title = document.getElementById("noteTitle").value;
    const text = document.getElementById("noteText").value;

    notes.push({ title, text, id: Date.now() });
    localStorage.setItem("notes", JSON.stringify(notes));
    renderNotes();
}

function renderNotes() {
    document.getElementById("notesGrid").innerHTML = notes.map(n =>
        `<div class="note-card"><h3>${n.title}</h3><p>${n.text}</p></div>`
    ).join("");
}

/* =========================
   ANKI SYSTEM
========================= */
function saveAnki() {
    const front = document.getElementById("ankiFront").value;
    const back = document.getElementById("ankiBack").value;

    anki.push({ front, back, id: Date.now() });
    localStorage.setItem("anki", JSON.stringify(anki));
}

/* =========================
   SNAKE GAME
========================= */
let canvas, ctx;
let snake, dir, apple;
let interval;

function initSnake() {
    canvas = document.getElementById("gameCanvas");
    ctx = canvas.getContext("2d");

    snake = [{x:10,y:10}];
    dir = {x:1,y:0};

    spawnApple();

    if (interval) clearInterval(interval);
    interval = setInterval(updateSnake, 120);
}

function spawnApple() {
    apple = {
        x: Math.floor(Math.random()*30),
        y: Math.floor(Math.random()*20)
    };
}

function updateSnake() {
    const head = {
        x: snake[0].x + dir.x,
        y: snake[0].y + dir.y
    };

    snake.unshift(head);

    if (head.x === apple.x && head.y === apple.y) {
        spawnApple();
    } else {
        snake.pop();
    }

    draw();
}

function draw() {
    ctx.clearRect(0,0,600,400);

    ctx.fillStyle = "red";
    ctx.fillRect(apple.x*20, apple.y*20, 18, 18);

    ctx.fillStyle = "lime";
    snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18));
}

/* =========================
   CONTROLS
========================= */
document.addEventListener("keydown", e => {
    if (!document.getElementById("snake").classList.contains("active")) return;

    if (e.key === "ArrowUp") dir = {x:0,y:-1};
    if (e.key === "ArrowDown") dir = {x:0,y:1};
    if (e.key === "ArrowLeft") dir = {x:-1,y:0};
    if (e.key === "ArrowRight") dir = {x:1,y:0};
});

/* =========================
   INIT
========================= */
renderNotes();
</script>

</body>
</html>
