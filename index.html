<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Lernplattform</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0d1b2a;
  color:white;
}

.container { width:90%; margin:auto; }

.dashboard {
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
}

.card {
  background:#1a2a4c;
  padding:1rem;
  border-radius:12px;
  flex:1 1 300px;
  cursor:pointer;
}
.card:hover { transform:scale(1.05); }

.section {
  background:#1a2a4c;
  padding:1rem;
  margin-top:1rem;
  border-radius:12px;
}

button {
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:6px;
}

textarea, input {
  width:100%;
  margin-top:8px;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#112240;
  color:white;
}

.lecture-image {
  width:100%;
  max-width:500px;
  margin-top:10px;
  border-radius:10px;
}

.file-box {
  margin-top:10px;
  padding:8px;
  background:#112240;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">
<h1>KI Methoden & Anwendungen</h1>

<div class="dashboard" id="dashboard">

<div class="card" onclick="openLecture()">📚 Vorlesung</div>
<div class="card" onclick="openToday()">🔁 Heute</div>
<div class="card" onclick="openNotes()">📝 Notizen</div>
<div class="card" onclick="openAnki()">🧠 Anki</div>
<div class="card">
<button onclick="window.open('https://chat.openai.com')">❓ Fragen</button>
</div>

</div>

<div id="content"></div>

</div>

<script>

// ===== VORLESUNG =====
function openLecture(){
document.getElementById("dashboard").style.display="none";

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Warum KI jetzt?</h2>

<p><strong>Einleitung:</strong><br>
⭐️ Künstliche Intelligenz gewinnt immer mehr an Relevanz und Potenzial.</p>

<p><strong>Erklärung:</strong><br>
💡 Sie ist großer Bestandteil der 5 Top Tech Themen.<br><br>
💡 KI kann unser Leben massiv verändern.<br><br>
💡 Risiken bestehen ebenfalls.<br><br>
💡 Jobs verändern sich grundlegend.</p>

<p><strong>Merksatz:</strong><br>
⚠️ KI verändert unsere Zukunft.</p>

<hr>

<input type="file" multiple onchange="uploadLectureFiles(event)">
<div id="lectureFiles"></div>

<button onclick="back()">Zurück</button>
</div>
`;

renderLectureFiles();
}

// ===== LECTURE FILES =====
function uploadLectureFiles(e){
let stored=JSON.parse(localStorage.getItem("lectureFiles")||"[]");

for(let f of e.target.files){
let reader=new FileReader();
reader.onload=(ev)=>{
stored.push({name:f.name,data:ev.target.result});
localStorage.setItem("lectureFiles",JSON.stringify(stored));
renderLectureFiles();
};
reader.readAsDataURL(f);
}
}

function renderLectureFiles(){
let c=document.getElementById("lectureFiles");
if(!c) return;

c.innerHTML="";
let files=JSON.parse(localStorage.getItem("lectureFiles")||"[]");

files.forEach((f,i)=>{
let div=document.createElement("div");
div.className="file-box";

if(f.data.startsWith("data:image")){
div.innerHTML=`
<img src="${f.data}" class="lecture-image">
<button onclick="deleteLectureFile(${i})">Löschen</button>
`;
}else{
div.innerHTML=`
<a href="${f.data}" target="_blank">${f.name}</a>
<button onclick="deleteLectureFile(${i})">Löschen</button>
`;
}

c.appendChild(div);
});
}

function deleteLectureFile(i){
let files=JSON.parse(localStorage.getItem("lectureFiles")||"[]");
files.splice(i,1);
localStorage.setItem("lectureFiles",JSON.stringify(files));
renderLectureFiles();
}

// ===== NOTIZEN =====
let tempFiles=[];

function openNotes(){
document.getElementById("dashboard").style.display="none";

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Notizen</h2>

<textarea id="noteText"></textarea>

<input type="file" multiple onchange="uploadNoteFiles(event)">
<div id="notePreview"></div>

<button onclick="saveNote()">Speichern</button>
<button onclick="back()">Zurück</button>
</div>
`;

tempFiles=[];
}

function uploadNoteFiles(e){
for(let f of e.target.files){
let reader=new FileReader();
reader.onload=(ev)=>{
tempFiles.push({name:f.name,data:ev.target.result});
renderNotePreview();
};
reader.readAsDataURL(f);
}
}

function renderNotePreview(){
let c=document.getElementById("notePreview");
c.innerHTML="";

tempFiles.forEach((f,i)=>{
let div=document.createElement("div");
div.className="file-box";

if(f.data.startsWith("data:image")){
div.innerHTML=`
<img src="${f.data}" class="lecture-image">
<button onclick="removeTempFile(${i})">✖</button>`;
}else{
div.innerHTML=`
${f.name}
<button onclick="removeTempFile(${i})">✖</button>`;
}

c.appendChild(div);
});
}

function removeTempFile(i){
tempFiles.splice(i,1);
renderNotePreview();
}

function saveNote(){
let notes=JSON.parse(localStorage.getItem("notes")||"[]");

notes.push({
text:document.getElementById("noteText").value,
files:tempFiles
});

localStorage.setItem("notes",JSON.stringify(notes));
back();
}

// ===== TODAY =====
function openToday(){
document.getElementById("dashboard").style.display="none";

let cards=JSON.parse(localStorage.getItem("ankiCards")||"[]");
let due=cards.filter(c=>c.next<=Date.now());

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Heute</h2>
<ul>${due.map(c=>"<li>"+c.q+"</li>").join("") || "🎉 Nichts fällig"}</ul>
<button onclick="openAnki()">Lernen</button>
<button onclick="back()">Zurück</button>
</div>
`;
}

// ===== ANKI =====
if(!localStorage.getItem("ankiCards")){
localStorage.setItem("ankiCards",JSON.stringify([
{q:"Was ist KI?",a:"Maschinen lernen aus Daten",interval:1,ease:2.5,next:Date.now()}
]));
}

let current=null;

function openAnki(){
document.getElementById("dashboard").style.display="none";

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Anki</h2>

<div id="card"></div>

<button onclick="showAnswer()">Antwort</button>

<button onclick="rate('again')">🔴</button>
<button onclick="rate('good')">🟢</button>

<hr>

<input id="q" placeholder="Frage">
<input id="a" placeholder="Antwort">
<button onclick="addCard()">Speichern</button>

<button onclick="back()">Zurück</button>
</div>
`;

nextCard();
}

function nextCard(){
let cards=JSON.parse(localStorage.getItem("ankiCards"));
let due=cards.filter(c=>c.next<=Date.now());

if(!due.length){
document.getElementById("card").innerHTML="🎉 Fertig!";
return;
}

current=cards.indexOf(due[0]);
document.getElementById("card").innerHTML=cards[current].q;
}

function showAnswer(){
let cards=JSON.parse(localStorage.getItem("ankiCards"));
document.getElementById("card").innerHTML=
cards[current].q+"<br>"+cards[current].a;
}

function rate(type){
let cards=JSON.parse(localStorage.getItem("ankiCards"));
let c=cards[current];

if(type==="again"){c.interval=1;}
if(type==="good"){c.interval*=c.ease;}

c.next=Date.now()+c.interval*86400000;

localStorage.setItem("ankiCards",JSON.stringify(cards));
nextCard();
}

function addCard(){
let cards=JSON.parse(localStorage.getItem("ankiCards"));
cards.push({
q:document.getElementById("q").value,
a:document.getElementById("a").value,
interval:1,
ease:2.5,
next:Date.now()
});
localStorage.setItem("ankiCards",JSON.stringify(cards));
alert("Gespeichert");
}

// ===== NAV =====
function back(){
document.getElementById("content").innerHTML="";
document.getElementById("dashboard").style.display="flex";
}

</script>

</body>
</html>
