<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Lernplattform</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #0d1b2a;
  color: white;
}

.container { width: 90%; margin: auto; }
.dashboard { display: flex; flex-wrap: wrap; gap: 1rem; }

.card {
  background: #1a2a4c;
  padding: 1rem;
  border-radius: 12px;
  flex: 1 1 300px;
  cursor: pointer;
  transition: 0.3s;
}
.card:hover { transform: scale(1.05); }

.file-preview img {
  width: 100px;
  border-radius: 8px;
}

.file-box {
  margin-top: 10px;
  padding: 5px;
  background: #112240;
  border-radius: 8px;
}
.file-box button {
  float: right;
  background: none;
  border: none;
  color: red;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container">

<h1>KI Lernplattform</h1>

<div class="dashboard" id="dashboard">

<div class="card">
<h2>Vorlesungen</h2>
<ul>
<li onclick="openLecture(0)">Warum KI jetzt?</li>
</ul>
</div>

<div class="card" onclick="openNotes()">
<h2>Notizen</h2>
<div id="notesList"></div>
</div>

</div>

<div id="content"></div>

</div>

<script>

// ======= DATEN =======
const lectures = [
{
title:"Warum KI jetzt?",
intro:"⭐️ KI gewinnt immer mehr an Relevanz.",
explanation:"💡 KI verändert unser Leben.",
merksatz:"⚠️ KI verändert die Zukunft."
}
];

// ======= VORLESUNG =======
function openLecture(index){
document.getElementById('dashboard').style.display='none';

const files = JSON.parse(localStorage.getItem("lectureFiles"+index)||"[]");

document.getElementById('content').innerHTML=`
<h2>${lectures[index].title}</h2>
<p>${lectures[index].intro}</p>
<p>${lectures[index].explanation}</p>
<p>${lectures[index].merksatz}</p>

<h3>Dateien hochladen</h3>
<input type="file" multiple onchange="uploadLectureFile(event, ${index})">

<div id="fileList"></div>

<button onclick="back()">Zurück</button>
`;

renderLectureFiles(index);
}

// Upload Lecture
function uploadLectureFile(e, index){
const files = e.target.files;
let stored = JSON.parse(localStorage.getItem("lectureFiles"+index)||"[]");

for(let file of files){
const reader = new FileReader();
reader.onload = function(ev){
stored.push({name:file.name, data:ev.target.result});
localStorage.setItem("lectureFiles"+index, JSON.stringify(stored));
renderLectureFiles(index);
};
reader.readAsDataURL(file);
}
}

// Anzeigen Lecture Dateien
function renderLectureFiles(index){
const container = document.getElementById("fileList");
container.innerHTML="";

let stored = JSON.parse(localStorage.getItem("lectureFiles"+index)||"[]");

stored.forEach((file,i)=>{
const div = document.createElement("div");
div.className="file-box";

if(file.data.includes("image")){
div.innerHTML = `<img src="${file.data}"><button onclick="deleteLectureFile(${index},${i})">✖</button>`;
}else{
div.innerHTML = `<a href="${file.data}" target="_blank">${file.name}</a><button onclick="deleteLectureFile(${index},${i})">✖</button>`;
}

container.appendChild(div);
});
}

function deleteLectureFile(index,i){
let stored = JSON.parse(localStorage.getItem("lectureFiles"+index)||"[]");
stored.splice(i,1);
localStorage.setItem("lectureFiles"+index, JSON.stringify(stored));
renderLectureFiles(index);
}

// ======= NOTIZEN =======
function openNotes(){
document.getElementById('dashboard').style.display='none';

document.getElementById('content').innerHTML=`
<h2>Notizen</h2>

<textarea id="noteText"></textarea>
<br>
<input type="file" multiple onchange="uploadNoteFile(event)">
<div id="noteFiles"></div>

<button onclick="saveNote()">Speichern</button>
<button onclick="back()">Zurück</button>
`;

renderNotes();
}

// Save Note
function saveNote(){
const text = document.getElementById("noteText").value;
let notes = JSON.parse(localStorage.getItem("notes")||"[]");
notes.push({text:text, files:[]});
localStorage.setItem("notes", JSON.stringify(notes));
renderNotes();
}

// Upload Note File
function uploadNoteFile(e){
const files = e.target.files;
let notes = JSON.parse(localStorage.getItem("notes")||"[]");
let last = notes[notes.length-1];

if(!last) return;

for(let file of files){
const reader = new FileReader();
reader.onload = function(ev){
last.files.push({name:file.name, data:ev.target.result});
localStorage.setItem("notes", JSON.stringify(notes));
renderNotes();
};
reader.readAsDataURL(file);
}
}

// Render Notes
function renderNotes(){
const container = document.getElementById("notesList");
if(!container) return;

container.innerHTML="";
let notes = JSON.parse(localStorage.getItem("notes")||"[]");

notes.forEach((note,i)=>{
const div = document.createElement("div");
div.className="file-box";

let filesHtml = "";
(note.files||[]).forEach((f,fi)=>{
filesHtml += `<div>
<a href="${f.data}" target="_blank">${f.name}</a>
<button onclick="deleteNoteFile(${i},${fi})">✖</button>
</div>`;
});

div.innerHTML = `
${note.text}
${filesHtml}
<button onclick="deleteNote(${i})">Notiz löschen</button>
`;

container.appendChild(div);
});
}

// Delete Note
function deleteNote(i){
let notes = JSON.parse(localStorage.getItem("notes")||"[]");
notes.splice(i,1);
localStorage.setItem("notes", JSON.stringify(notes));
renderNotes();
}

// Delete Note File
function deleteNoteFile(i,fi){
let notes = JSON.parse(localStorage.getItem("notes")||"[]");
notes[i].files.splice(fi,1);
localStorage.setItem("notes", JSON.stringify(notes));
renderNotes();
}

// ======= NAV =======
function back(){
document.getElementById('content').innerHTML="";
document.getElementById('dashboard').style.display='flex';
renderNotes();
}

renderNotes();

</script>

</body>
</html>
