<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-LearnHub Ultimate | KI Methoden</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --bg: #f1f5f9;
            --sidebar: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        nav { width: 280px; background: var(--sidebar); border-right: 1px solid #e2e8f0; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 10px; }
        .nav-link { padding: 12px 15px; border-radius: 12px; text-decoration: none; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .nav-link.active { background: var(--primary-glow); color: var(--primary); }

        /* Main Content */
        main { flex: 1; padding: 2.5rem; overflow-y: auto; }
        .content-section { display: none; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Notizen & Cards */
        .card { background: white; padding: 1.5rem; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
        .note-card { background: white; padding: 1.5rem; border-radius: 18px; border: 1px solid #e2e8f0; cursor: pointer; position: relative; height: 220px; display: flex; flex-direction: column; overflow: hidden; }
        .note-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .note-card h4 { margin: 0 0 10px 0; color: var(--primary); }
        .note-card p { font-size: 0.85rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .note-thumb { width: 100%; height: 60px; object-fit: cover; border-radius: 8px; margin-top: auto; }

        /* Modal & Editor */
        #noteModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 2.5rem; border-radius: 24px; max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; right: 25px; top: 25px; cursor: pointer; font-size: 1.5rem; }

        #editArea { display: none; flex-direction: column; gap: 10px; }
        #viewArea img { max-width: 100%; border-radius: 12px; margin: 15px 0; }

        /* Inputs */
        input, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; margin-bottom: 1rem; font-family: inherit; }
        .btn { border-radius: 12px; padding: 12px 20px; font-weight: 700; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid #e2e8f0; color: var(--text-muted); }
        .ai-badge { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; padding: 15px; border-radius: 16px; text-decoration: none; margin-top: auto; font-weight: bold; text-align: center; }

        /* Flashcards */
        .flashcard-container { perspective: 1000px; height: 260px; cursor: pointer; margin: 20px 0; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 24px; padding: 30px; text-align: center; border: 1px solid #e2e8f0; background: white; }
        .card-back { background: #f5f3ff; color: var(--primary); transform: rotateY(180deg); }

        @media print {
            body * { visibility: hidden; }
            #noteModal, #noteModal * { visibility: visible; }
            .close-modal, .modal-actions { display: none !important; }
            .modal-content { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-microchip"></i> AI-LearnHub</div>
        <div class="nav-link active" onclick="showSection('dashboard', this)"><i class="fas fa-home"></i> Dashboard</div>
        <div class="nav-link" onclick="showSection('notes', this)"><i class="fas fa-file-alt"></i> Vorlesungen</div>
        <div class="nav-link" onclick="showSection('anki', this)"><i class="fas fa-brain"></i> Anki</div>
        <div class="nav-link" onclick="showSection('calendar', this)"><i class="fas fa-calendar"></i> Termine</div>
        
        <a href="https://chatgpt.com" target="_blank" class="ai-badge"><i class="fas fa-robot"></i> Ask AI Assistant</a>
    </nav>

    <main>
        <section id="dashboard" class="content-section active">
            <h1>Willkommen zurück 👋</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem;">
                <div class="card"><h3>Fällig</h3><h2 id="dash-due" style="color:var(--primary)">0</h2><button class="btn btn-primary" onclick="showSection('anki')">Lernen</button></div>
                <div class="card"><h3>Notizen</h3><h2 id="dash-notes">0</h2><button class="btn btn-outline" onclick="showSection('notes')">Öffnen</button></div>
            </div>
        </section>

        <section id="notes" class="content-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Vorlesungsnotizen</h1>
                <button class="btn btn-primary" onclick="toggleForm('noteFormCard')">+ Neue Notiz</button>
            </div>
            <div id="noteFormCard" class="card" style="display:none;">
                <input type="text" id="noteTitle" placeholder="Titel der Lektion">
                <textarea id="noteText" rows="6" placeholder="Zusammenfassung..."></textarea>
                <div style="margin-bottom:15px;">
                    <label style="font-size:0.8rem; color:var(--text-muted)">Bild hinzufügen:</label><br>
                    <input type="file" id="noteImage" accept="image/*" style="font-size:0.8rem;">
                </div>
                <button class="btn btn-primary" onclick="saveNote()">Speichern</button>
            </div>
            <div class="notes-grid" id="notesGrid"></div>
        </section>

        <section id="anki" class="content-section">
            <h1>Anki Training</h1>
            <div class="card" style="max-width: 600px; margin: 0 auto; text-align: center;">
                <div class="flashcard-container" id="f-container" onclick="this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="card-front" id="dispFront">Session starten?</div>
                        <div class="card-back" id="dispBack">Antwort</div>
                    </div>
                </div>
                <div id="ankiControls" style="display:none; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                    <button class="btn" style="background:#fee2e2; color:#ef4444" onclick="rate(1)">1m</button>
                    <button class="btn" style="background:#fef3c7; color:#d97706" onclick="rate(10)">10m</button>
                    <button class="btn" style="background:#e0e7ff; color:#4338ca" onclick="rate(1440)">1T</button>
                    <button class="btn" style="background:#dcfce7; color:#16a34a" onclick="rate(4320)">3T</button>
                </div>
                <button id="startAnki" class="btn btn-primary" style="width:100%" onclick="loadNextCard()">Karte ziehen</button>
            </div>
            <div class="card" style="margin-top: 2rem;">
                <input type="text" id="ankiQ" placeholder="Frage"><input type="text" id="ankiA" placeholder="Antwort">
                <button class="btn btn-primary" onclick="addAnkiCard()">Karte erstellen</button>
            </div>
        </section>

        <section id="calendar" class="content-section">
            <h1>Termine</h1>
            <div class="card">
                <input type="date" id="eventDate"><input type="text" id="eventTitle" placeholder="Klausur KI Methoden...">
                <button class="btn btn-primary" onclick="addEvent()">Speichern</button>
            </div>
            <div id="eventList"></div>
        </section>
    </main>

    <div id="noteModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeNote()">&times;</span>
            <div class="modal-actions" style="display:flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px;">
                <button class="btn btn-outline" onclick="enableEdit()"><i class="fas fa-edit"></i> Bearbeiten</button>
                <button class="btn btn-outline" onclick="window.print()"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>

            <div id="viewArea">
                <h2 id="modalTitleDisplay"></h2>
                <div id="modalDate" style="color:var(--text-muted); font-size:0.8rem; margin-bottom:15px;"></div>
                <p id="modalTextDisplay"></p>
                <div id="modalImageContainer"></div>
            </div>

            <div id="editArea">
                <input type="text" id="editTitle">
                <textarea id="editText" rows="10"></textarea>
                <button class="btn btn-primary" onclick="updateNote()">Änderungen speichern</button>
            </div>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('full_ai_notes') || '[]');
        let anki = JSON.parse(localStorage.getItem('full_ai_anki') || '[]');
        let events = JSON.parse(localStorage.getItem('full_ai_events') || '[]');
        let currentNoteId = null;
        let currentAnkiIdx = -1;

        function showSection(id, element) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(element) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                element.classList.add('active');
            }
            updateDash();
        }

        function toggleForm(id) {
            const f = document.getElementById(id);
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }

        // --- NOTIZEN LOGIK ---
        function saveNote() {
            const title = document.getElementById('noteTitle').value;
            const text = document.getElementById('noteText').value;
            const imgFile = document.getElementById('noteImage').files[0];

            if(!title) return;

            if (imgFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    processSave(title, text, e.target.result);
                };
                reader.readAsDataURL(imgFile);
            } else {
                processSave(title, text, null);
            }
        }

        function processSave(title, text, image) {
            notes.unshift({ title, text, image, date: new Date().toLocaleDateString(), id: Date.now() });
            localStorage.setItem('full_ai_notes', JSON.stringify(notes));
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteText').value = '';
            document.getElementById('noteImage').value = '';
            renderNotes();
            toggleForm('noteFormCard');
            updateDash();
        }

        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            grid.innerHTML = notes.map(n => `
                <div class="note-card" onclick="openNote('${n.id}')">
                    <h4>${n.title}</h4>
                    <p>${n.text}</p>
                    ${n.image ? `<img src="${n.image}" class="note-thumb">` : ''}
                    <i class="fas fa-trash-alt" style="position:absolute; top:15px; right:15px; opacity:0.2;" onclick="event.stopPropagation(); deleteNote('${n.id}')"></i>
                </div>
            `).join('');
        }

        function openNote(id) {
            currentNoteId = id;
            const note = notes.find(n => n.id == id);
            document.getElementById('modalTitleDisplay').innerText = note.title;
            document.getElementById('modalTextDisplay').innerText = note.text;
            document.getElementById('modalDate').innerText = "Erstellt am: " + note.date;
            document.getElementById('modalImageContainer').innerHTML = note.image ? `<img src="${note.image}">` : '';
            
            document.getElementById('editArea').style.display = 'none';
            document.getElementById('viewArea').style.display = 'block';
            document.getElementById('noteModal').style.display = 'flex';
        }

        function enableEdit() {
            const note = notes.find(n => n.id == currentNoteId);
            document.getElementById('editTitle').value = note.title;
            document.getElementById('editText').value = note.text;
            document.getElementById('viewArea').style.display = 'none';
            document.getElementById('editArea').style.display = 'flex';
        }

        function updateNote() {
            const note = notes.find(n => n.id == currentNoteId);
            note.title = document.getElementById('editTitle').value;
            note.text = document.getElementById('editText').value;
            localStorage.setItem('full_ai_notes', JSON.stringify(notes));
            renderNotes();
            openNote(currentNoteId); // Zurück zur Ansicht
        }

        function deleteNote(id) {
            if(confirm("Löschen?")) {
                notes = notes.filter(n => n.id != id);
                localStorage.setItem('full_ai_notes', JSON.stringify(notes));
                renderNotes();
                updateDash();
            }
        }

        function closeNote() { document.getElementById('noteModal').style.display = 'none'; }

        // --- ANKI ---
        function addAnkiCard() {
            const q = document.getElementById('ankiQ').value;
            const a = document.getElementById('ankiA').value;
            if(!q || !a) return;
            anki.push({ q, a, next: Date.now() });
            localStorage.setItem('full_ai_anki', JSON.stringify(anki));
            document.getElementById('ankiQ').value = '';
            document.getElementById('ankiA').value = '';
            updateDash();
        }

        function loadNextCard() {
            const due = anki.filter(c => c.next <= Date.now());
            if(due.length === 0) { document.getElementById('dispFront').innerText = "Alles gelernt! 🎉"; return; }
            const card = due[0];
            currentAnkiIdx = anki.indexOf(card);
            document.getElementById('dispFront').innerText = card.q;
            document.getElementById('dispBack').innerText = card.a;
            document.getElementById('f-container').classList.remove('flipped');
            document.getElementById('startAnki').style.display = 'none';
            document.getElementById('ankiControls').style.display = 'grid';
        }

        function rate(min) {
            anki[currentAnkiIdx].next = Date.now() + (min * 60000);
            localStorage.setItem('full_ai_anki', JSON.stringify(anki));
            document.getElementById('ankiControls').style.display = 'none';
            document.getElementById('startAnki').style.display = 'block';
            updateDash();
            loadNextCard();
        }

        // --- TERMINE ---
        function addEvent() {
            const date = document.getElementById('eventDate').value;
            const text = document.getElementById('eventTitle').value;
            if(!date || !text) return;
            events.push({ date, text, id: Date.now() });
            events.sort((a,b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('full_ai_events', JSON.stringify(events));
            renderEvents();
        }

        function renderEvents() {
            document.getElementById('eventList').innerHTML = events.map(e => `
                <div class="card" style="display:flex; justify-content:space-between; padding:10px 20px;">
                    <span><b>${e.date}</b>: ${e.text}</span>
                    <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="deleteEvent(${e.id})"></i>
                </div>
            `).join('');
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            localStorage.setItem('full_ai_events', JSON.stringify(events));
            renderEvents();
        }

        function updateDash() {
            document.getElementById('dash-notes').innerText = notes.length;
            document.getElementById('dash-due').innerText = anki.filter(c => c.next <= Date.now()).length;
        }

        window.onload = () => { renderNotes(); renderEvents(); updateDash(); };
    </script>
</body>
</html>
