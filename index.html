<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KI Lernplattform</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
    header { padding: 20px 40px; background: #020617; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
    nav a { margin-left: 20px; text-decoration: none; color: #94a3b8; }
    nav a:hover { color: white; }
    .container { padding: 40px; }
    .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #020617; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .progress-bar { height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 10px; }
    .progress { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); width: 0%; }
    .btn { display: inline-block; margin-top: 10px; padding: 10px 15px; background: #22c55e; color: black; border-radius: 10px; text-decoration: none; font-weight: 600; }
    .lesson { background: #020617; padding: 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    .skill { margin-top: 10px; font-size: 14px; color: #38bdf8; }
  </style>
</head>
<body>

<header>
  <h1>KI Lernplattform</h1>
  <nav>
    <a href="#">Dashboard</a>
  </nav>
</header>

<div class="container">

  <section class="dashboard">

    <div class="card">
      <h3>Fortschritt</h3>
      <div class="progress-bar"><div class="progress" id="progressBar"></div></div>
      <p id="progressText"></p>
    </div>

    <div class="card">
      <h3>Skills</h3>
      <div id="skills"></div>
    </div>

    <div class="card">
      <h3>Wiederholung</h3>
      <div id="review"></div>
    </div>

  </section>

  <h2>Vorlesungen</h2>

  <div class="lesson">
    <span>Einführung in KI</span>
    <button class="btn" onclick="completeLesson('intro')">Abschließen</button>
  </div>

  <div class="lesson">
    <span>Lineare Regression</span>
    <button class="btn" onclick="completeLesson('regression')">Abschließen</button>
  </div>

  <div class="lesson">
    <span>Klassifikation</span>
    <button class="btn" onclick="completeLesson('classification')">Abschließen</button>
  </div>

</div>

<script>

const lessons = ['intro', 'regression', 'classification'];

function completeLesson(lesson) {
  localStorage.setItem(lesson, 'done');

  let reviewDate = new Date();
  reviewDate.setDate(reviewDate.getDate() + 2);
  localStorage.setItem(lesson + '_review', reviewDate);

  updateUI();
}

function updateUI() {
  let completed = lessons.filter(l => localStorage.getItem(l) === 'done').length;
  let progress = (completed / lessons.length) * 100;

  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('progressText').innerText = completed + ' von ' + lessons.length + ' abgeschlossen';

  let skills = [];
  if (localStorage.getItem('regression') === 'done') skills.push('Regression verstehen');
  if (localStorage.getItem('classification') === 'done') skills.push('Klassifikation anwenden');

  document.getElementById('skills').innerHTML = skills.map(s => '<div class="skill">✔ ' + s + '</div>').join('');

  let reviewHTML = '';
  let today = new Date();

  lessons.forEach(l => {
    let reviewDate = new Date(localStorage.getItem(l + '_review'));
    if (today >= reviewDate) {
      reviewHTML += `<div class="skill">🔁 Wiederhole: ${l}</div>`;
    }
  });

  document.getElementById('review').innerHTML = reviewHTML || 'Keine Wiederholungen nötig';
}

updateUI();

</script>

</body>
</html>
