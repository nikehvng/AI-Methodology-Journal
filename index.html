<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-LearnHub Ultimate | SRS & Management Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.15); --bg: #f8fafc; --sidebar: #ffffff; --card-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0; }
        body.dark-mode { --bg: #0f172a; --sidebar: #1e293b; --card-bg: #1e293b; --text-main: #f1f5f9; --text-muted: #94a3b8; --border: #334155; }
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 2rem 1.2rem; display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 12px; }
        .nav-link { padding: 12px 15px; border-radius: 14px; text-decoration: none; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .nav-link.active { background: var(--primary); color: white; }
        .pomodoro-box { margin-top: 1rem; padding: 1rem; background: var(--primary-glow); border-radius: 18px; text-align: center; }
        #timer-display { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 5px 0; }
        main { flex: 1; padding: 2rem 3rem; overflow-y: auto; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 1.5rem; }
        .btn { border-radius: 12px; padding: 10px 20px; font-weight: 700; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-danger { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); margin-bottom: 1rem; font-family: inherit; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .note-card { background: var(--card-bg); padding: 1.5rem; border-radius: 22px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .flashcard-container { perspective: 1000px; height: 250px; cursor: pointer; margin: 20px 0; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); font-size: 1.2rem; padding: 20px; text-align: center; flex-direction: column; }
        .card-back { transform: rotateY(180deg); color: var(--primary); background: var(--primary-glow); }
        #noteModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 2.5rem; border-radius: 25px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; }
        .modal-img { max-width: 100%; border-radius: 15px; margin: 15px 0; }
        .anki-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-brain"></i> LearnHub</div>
        <div class="nav-link active" onclick="showSection('dashboard', this)"><i class="fas fa-shapes"></i> Dashboard</div>
        <div class="nav-link" onclick="showSection('notes', this)"><i class="fas fa-book-open"></i> Vorlesungen</div>
        <div class="nav-link" onclick="showSection('anki', this)"><i class="fas fa-bolt"></i> Anki Karten</div>
        <div class="nav-link" onclick="showSection('quiz', this)"><i class="fas fa-puzzle-piece"></i> Quiz-Master</div>
        
        <div class="pomodoro-box">
            <small>Fokus-Timer</small>
            <div id="timer-display">45:00</div>
            <button class="btn btn-primary" style="padding: 5px 15px; font-size: 0.8rem;" onclick="toggleTimer()" id="timer-btn">Start</button>
        </div>
        <button class="btn" style="margin-top: auto;" onclick="toggleDarkMode()"><i class="fas fa-moon"></i> Dark Mode</button>
    </nav>

    <main>
        <section id="dashboard" class="content-section active">
            <h1>Willkommen! 🚀</h1>
            <div class="card" style="background: linear-gradient(135deg, var(--primary), #818cf8); color: white;">
                <h3 id="user-level">Level 1</h3>
                <h2 id="user-xp">0 XP</h2>
                <div style="background: rgba(255,255,255,0.2); height: 10px; border-radius: 10px;"><div id="xp-bar" style="background: white; width: 0%; height: 100%; border-radius: 10px;"></div></div>
            </div>
            <div style="display: flex; gap: 1rem;">
                <div class="card" style="flex: 1;"><h3>Notizen</h3><h2 id="dash-notes">0</h2></div>
                <div class="card" style="flex: 1;"><h3>Anki fällig</h3><h2 id="dash-due">0</h2></div>
            </div>
        </section>

        <section id="notes" class="content-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <h1>Notizen</h1>
                <button class="btn btn-primary" onclick="prepareNewNote()">Neue Notiz</button>
            </div>
            <div id="noteForm" class="card" style="display: none;">
                <input type="text" id="noteTitle" placeholder="Titel">
                <input type="text" id="noteTag" placeholder="Tag">
                <textarea id="noteText" rows="4" placeholder="Inhalt..."></textarea>
                <input type="file" id="noteImage" accept="image/*" style="margin-bottom: 10px;">
                <button class="btn btn-primary" id="saveNoteBtn" onclick="saveNote()">Speichern</button>
            </div>
            <div id="notesGrid" class="notes-grid"></div>
        </section>

        <section id="anki" class="content-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <h1>Anki Karten (SRS)</h1>
                <button class="btn btn-primary" onclick="prepareNewAnki()">Neue Karte</button>
            </div>
            
            <div id="ankiForm" class="card" style="display: none;">
                <input type="text" id="ankiFront" placeholder="Frage">
                <input type="text" id="ankiBack" placeholder="Antwort">
                <input type="text" id="ankiCat" placeholder="Kategorie (z.B. Biologie)">
                <button class="btn btn-primary" id="saveAnkiBtn" onclick="saveAnki()">Karte hinzufügen</button>
                <button class="btn btn-outline" onclick="toggleForm('ankiForm')">Abbrechen</button>
            </div>

            <div class="card" style="max-width: 500px; margin: 0 auto 2rem auto; text-align: center;">
                <div id="anki-counter" style="margin-bottom: 10px; font-weight: 600; color: var(--primary);">0 Karten fällig</div>
                <div class="flashcard-container" id="f-container" onclick="this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="card-front">
                            <small id="dispCat" style="opacity: 0.6; margin-bottom: 10px;"></small>
                            <div id="dispFront">Bereit?</div>
                        </div>
                        <div class="card-back" id="dispBack">Antwort</div>
                    </div>
                </div>
                <div id="srs-actions" style="display: none; flex-wrap: wrap; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-danger" style="flex:1; min-width: 100px;" onclick="rateCard(1)">Falsch (1m)</button>
                    <button class="btn btn-outline" style="flex:1; min-width: 100px;" onclick="rateCard(2)">Gut (10m)</button>
                    <button class="btn btn-primary" style="flex:1; min-width: 100px;" onclick="rateCard(3)">Super (1T)</button>
                    <button class="btn btn-primary" style="flex:1; min-width: 100px; background: #10b981;" onclick="rateCard(4)">Easy (3T)</button>
                </div>
                <button id="next-card-btn" class="btn btn-primary" style="width: 100%" onclick="loadNextCard()">Start / Nächste</button>
            </div>

            <h3>Alle Karten verwalten</h3>
            <div id="anki-manager-list" class="card" style="padding: 0.5rem;">
                </div>
        </section>

        <section id="quiz" class="content-section">
            <h1>Quiz-Master</h1>
            <div class="card">
                <select id="quiz-note-select"></select>
                <button class="btn btn-primary" style="width: 100%" onclick="generateQuiz()">Starten</button>
            </div>
            <div id="quiz-display" class="card" style="display: none;">
                <h3 id="quiz-question"></h3>
                <input type="text" id="quiz-answer" placeholder="Deine Antwort...">
                <div id="quiz-feedback" style="margin-bottom: 10px; font-weight: bold;"></div>
                <button class="btn btn-primary" onclick="checkQuiz()">Prüfen</button>
            </div>
        </section>
    </main>

    <div id="noteModal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: start;">
                <h2 id="modalTitleDisplay"></h2>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-outline" id="exportBtn" title="Export"><i class="fas fa-download"></i></button>
                    <button class="btn btn-outline" id="editBtn" title="Bearbeiten"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-danger" id="deleteBtn" title="Löschen"><i class="fas fa-trash"></i></button>
                    <button class="btn" onclick="closeNote()"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="modalImageDisplay"></div>
            <p id="modalTextDisplay" style="white-space: pre-wrap;"></p>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('full_ai_notes') || '[]');
        let anki = JSON.parse(localStorage.getItem('full_ai_anki') || '[]');
        let stats = JSON.parse(localStorage.getItem('learn_stats') || '{"xp":0}');
        let currentEditId = null;
        let currentAnkiEditId = null;
        let currentAnkiCard = null;

        function updateDash() {
            const dueCount = anki.filter(c => !c.nextReview || c.nextReview <= Date.now()).length;
            document.getElementById('dash-notes').innerText = notes.length;
            document.getElementById('dash-due').innerText = dueCount;
            document.getElementById('anki-counter').innerText = `${dueCount} Karten fällig`;
            document.getElementById('user-xp').innerText = `${stats.xp} XP`;
            document.getElementById('xp-bar').style.width = `${(stats.xp % 100)}%`;
            document.getElementById('user-level').innerText = `Level ${Math.floor(stats.xp / 100) + 1}`;
            
            const sel = document.getElementById('quiz-note-select');
            if(sel) sel.innerHTML = notes.map(n => `<option value="${n.id}">${n.title}</option>`).join('');
            
            renderAnkiManager();
        }

        function addXP(v) { stats.xp += v; localStorage.setItem('learn_stats', JSON.stringify(stats)); updateDash(); }

        // --- NEU: ANKI MANAGER LISTE ---
        function renderAnkiManager() {
            const list = document.getElementById('anki-manager-list');
            if(!list) return;
            if(anki.length === 0) {
                list.innerHTML = `<p style="padding: 20px; text-align: center; color: var(--text-muted);">Noch keine Karten erstellt.</p>`;
                return;
            }
            list.innerHTML = anki.map(card => `
                <div class="anki-list-item">
                    <div style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px;">
                        <strong>${card.front}</strong> <br>
                        <small style="color: var(--primary)">${card.category}</small>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn btn-outline" style="padding: 5px 10px;" onclick="editAnkiById(${card.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-danger" style="padding: 5px 10px; background: #fee2e2;" onclick="deleteAnki(${card.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function deleteAnki(id) {
            if(confirm("Karte wirklich löschen?")) {
                anki = anki.filter(c => c.id != id);
                localStorage.setItem('full_ai_anki', JSON.stringify(anki));
                updateDash();
            }
        }

        function editAnkiById(id) {
            const card = anki.find(c => c.id == id);
            if(!card) return;
            currentAnkiEditId = card.id;
            document.getElementById('ankiFront').value = card.front;
            document.getElementById('ankiBack').value = card.back;
            document.getElementById('ankiCat').value = card.category;
            document.getElementById('saveAnkiBtn').innerText = "Änderung speichern";
            document.getElementById('ankiForm').style.display = "block";
            document.getElementById('ankiForm').scrollIntoView({behavior: "smooth"});
        }

        // --- SRS ANKI LOGIK ---
        function prepareNewAnki() {
            currentAnkiEditId = null;
            document.getElementById('ankiFront').value = "";
            document.getElementById('ankiBack').value = "";
            document.getElementById('ankiCat').value = "";
            document.getElementById('saveAnkiBtn').innerText = "Karte hinzufügen";
            toggleForm('ankiForm');
        }

        function saveAnki() {
            const f = document.getElementById('ankiFront').value;
            const b = document.getElementById('ankiBack').value;
            const c = document.getElementById('ankiCat').value || 'Allgemein';
            if(!f || !b) return;

            if(currentAnkiEditId) {
                const idx = anki.findIndex(card => card.id == currentAnkiEditId);
                anki[idx] = { ...anki[idx], front: f, back: b, category: c };
            } else {
                anki.push({ front: f, back: b, category: c, id: Date.now(), nextReview: Date.now() });
                addXP(5);
            }
            
            localStorage.setItem('full_ai_anki', JSON.stringify(anki));
            document.getElementById('ankiForm').style.display = "none";
            updateDash();
        }

        function loadNextCard() {
            const dueCards = anki.filter(c => c.nextReview <= Date.now());
            if(dueCards.length === 0) {
                document.getElementById('dispFront').innerText = "Alles gelernt! 🎉";
                document.getElementById('dispBack').innerText = "Komm später wieder.";
                document.getElementById('dispCat').innerText = "";
                document.getElementById('srs-actions').style.display = "none";
                return;
            }
            document.getElementById('f-container').classList.remove('flipped');
            currentAnkiCard = dueCards[Math.floor(Math.random() * dueCards.length)];
            document.getElementById('dispFront').innerText = currentAnkiCard.front;
            document.getElementById('dispBack').innerText = currentAnkiCard.back;
            document.getElementById('dispCat').innerText = currentAnkiCard.category.toUpperCase();
            document.getElementById('srs-actions').style.display = "flex";
            document.getElementById('next-card-btn').style.display = "none";
        }

        function rateCard(choice) {
            let offset = 0;
            switch(choice) {
                case 1: offset = 1 * 60 * 1000; break;
                case 2: offset = 10 * 60 * 1000; break;
                case 3: offset = 24 * 60 * 60 * 1000; break;
                case 4: offset = 3 * 24 * 60 * 60 * 1000; break;
            }
            currentAnkiCard.nextReview = Date.now() + offset;
            const idx = anki.findIndex(c => c.id === currentAnkiCard.id);
            anki[idx] = currentAnkiCard;
            localStorage.setItem('full_ai_anki', JSON.stringify(anki));
            addXP(choice * 3);
            document.getElementById('srs-actions').style.display = "none";
            document.getElementById('next-card-btn').style.display = "block";
            updateDash(); loadNextCard();
        }

        // --- NOTIZEN ---
        function deleteNote(id) {
            if(confirm("Diese Notiz wirklich löschen?")) {
                notes = notes.filter(n => n.id != id);
                localStorage.setItem('full_ai_notes', JSON.stringify(notes));
                renderNotes(); closeNote(); updateDash();
            }
        }

        function saveNote() {
            const t = document.getElementById('noteTitle').value;
            const txt = document.getElementById('noteText').value;
            const tag = document.getElementById('noteTag').value;
            const imgFile = document.getElementById('noteImage').files[0];
            const finalizeSave = (imgBase64 = null) => {
                if(currentEditId) {
                    const idx = notes.findIndex(n => n.id == currentEditId);
                    notes[idx] = { ...notes[idx], title: t, text: txt, tag: tag, image: imgBase64 || notes[idx].image };
                } else {
                    notes.unshift({ title: t, text: txt, tag: tag, id: Date.now(), image: imgBase64 });
                    addXP(10);
                }
                localStorage.setItem('full_ai_notes', JSON.stringify(notes));
                renderNotes(); toggleForm('noteForm'); updateDash();
            };
            if(imgFile) {
                const reader = new FileReader(); reader.onload = (e) => finalizeSave(e.target.result); reader.readAsDataURL(imgFile);
            } else { finalizeSave(); }
        }

        function renderNotes() {
            document.getElementById('notesGrid').innerHTML = notes.map(n => `
                <div class="note-card" onclick="openNote('${n.id}')">
                    <small style="color: var(--primary)">${n.tag || 'Allgemein'}</small>
                    <h4>${n.title}</h4>
                    ${n.image ? '<i class="fas fa-image" style="float: right"></i>' : ''}
                </div>`).join('');
        }

        function openNote(id) {
            const n = notes.find(x => x.id == id);
            document.getElementById('modalTitleDisplay').innerText = n.title;
            document.getElementById('modalTextDisplay').innerText = n.text;
            document.getElementById('modalImageDisplay').innerHTML = n.image ? `<img src="${n.image}" class="modal-img">` : "";
            document.getElementById('deleteBtn').onclick = () => deleteNote(n.id);
            document.getElementById('exportBtn').onclick = () => {
                const blob = new Blob([`Titel: ${n.title}\n\n${n.text}`], {type: 'text/plain'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${n.title}.txt`; a.click();
            };
            document.getElementById('editBtn').onclick = () => {
                closeNote(); currentEditId = n.id;
                document.getElementById('noteTitle').value = n.title;
                document.getElementById('noteText').value = n.text;
                document.getElementById('noteTag').value = n.tag;
                document.getElementById('saveNoteBtn').innerText = "Änderung speichern";
                document.getElementById('noteForm').style.display = "block";
            };
            document.getElementById('noteModal').style.display = 'flex';
        }

        // --- TIMER & UI ---
        let timerSeconds = 2700; let timerInterval = null;
        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; btn.innerText = "Start"; }
            else { 
                timerInterval = setInterval(() => {
                    timerSeconds--; updateTimerDisplay();
                    if(timerSeconds <= 0) { clearInterval(timerInterval); addXP(50); timerSeconds = 2700; alert("Zeit um!"); }
                }, 1000); btn.innerText = "Pause";
            }
        }
        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60); const s = timerSeconds % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
        function showSection(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
        function toggleForm(id) { const f = document.getElementById(id); f.style.display = f.style.display === 'none' ? 'block' : 'none'; }
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function closeNote() { document.getElementById('noteModal').style.display = 'none'; }
        function prepareNewNote() { currentEditId = null; document.getElementById('noteTitle').value = ""; document.getElementById('noteText').value = ""; document.getElementById('noteTag').value = ""; document.getElementById('saveNoteBtn').innerText = "Speichern"; toggleForm('noteForm'); }

        window.onload = () => { renderNotes(); updateDash(); };
    </script>
</body>
</html>
