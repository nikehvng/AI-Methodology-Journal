<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Lernplattform</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0d1b2a;
  color:white;
}

.container { width:90%; margin:auto; }

.dashboard {
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
}

.card {
  background:#1a2a4c;
  padding:1rem;
  border-radius:12px;
  flex:1 1 300px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover { transform:scale(1.05); }

.card ul { list-style:none; padding:0; }
.card li {
  background:#112240;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
}

.section {
  background:#1a2a4c;
  padding:1rem;
  margin-top:1rem;
  border-radius:12px;
}

button {
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

textarea {
  width:100%;
  height:120px;
  background:#112240;
  color:white;
}

input {
  width:100%;
  margin-top:5px;
  padding:8px;
  border-radius:6px;
  border:none;
}

.file-box {
  background:#112240;
  margin-top:5px;
  padding:5px;
  border-radius:6px;
}

.lecture-image {
  width:100%;
  max-width:500px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>KI Methoden & Anwendungen</h1>

<div class="dashboard" id="dashboard">

<div class="card">
<h2>Vorlesungen</h2>
<ul>
<li onclick="openLecture()">Warum KI jetzt?</li>
</ul>
</div>

<div class="card" onclick="openToday()">
<h2>Was steht heute an?</h2>
</div>

<div class="card" onclick="openNotes()">
<h2>Notizen</h2>
</div>

<div class="card" onclick="openAnki()">
<h2>Anki</h2>
</div>

<div class="card">
<h2>Fragen</h2>
<button onclick="window.open('https://chat.openai.com','_blank')">
Zu ChatGPT
</button>
</div>

</div>

<div id="content"></div>

</div>

<script>

// ===== VORLESUNG =====
function openLecture(){
document.getElementById("dashboard").style.display="none";

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Warum KI jetzt?</h2>

<p><strong>Einleitung:</strong><br>
⭐️ Künstliche Intelligenz gewinnt immer mehr an Relevanz und Potenzial.</p>

<p><strong>Erklärung:</strong><br>
💡 Sie ist großer Bestandteil der 5 Top Tech Themen.<br><br>
💡 KI wird als eine der wichtigsten Technologien der aktuellen Zeit gesehen. Expertenmeinungen zufolge kann sie unser Leben in vielerlei Hinsicht verändern, von Arbeitsweisen hin zu Interaktionen.<br><br>
💡 Gleichzeitig wird vor dem unvorsichtigen Umgang mit KI gewarnt, da Fehler nur schwer reversibel sein könnten.<br><br>
💡 Zukünftig könnte KI einen Teil unserer Arbeit übernehmen. Jobs könnten sich grundlegend verändern.</p>

<p><strong>Merksatz:</strong><br>
⚠️ KI wird unsere Zukunft grundlegend verändern. Es ist wichtig, sich mit Gefahren & Potenzialen auseinanderzusetzen.</p>

<hr>

<h3>Dateien zur Lektion</h3>
<input type="file" multiple onchange="uploadLectureFiles(event)">
<div id="lecturePreview"></div>

<button onclick="back()">Zurück</button>
</div>
`;

renderLectureFiles();
}

// ===== DATEIEN VORLESUNG =====
function uploadLectureFiles(e){
let files = e.target.files;
let stored = JSON.parse(localStorage.getItem("lectureFiles")||"[]");

for(let f of files){
let reader=new FileReader();
reader.onload=function(ev){
stored.push({name:f.name,data:ev.target.result});
localStorage.setItem("lectureFiles",JSON.stringify(stored));
renderLectureFiles();
};
reader.readAsDataURL(f);
}
}

function renderLectureFiles(){
let container=document.getElementById("lecturePreview");
if(!container) return;

container.innerHTML="";
let stored=JSON.parse(localStorage.getItem("lectureFiles")||"[]");

stored.forEach((f,i)=>{
let div=document.createElement("div");

if(f.data.startsWith("data:image")){
div.innerHTML=`
<img src="${f.data}" class="lecture-image">
<button onclick="deleteLectureFile(${i})">Löschen</button>`;
}else{
div.innerHTML=`
<a href="${f.data}" target="_blank">${f.name}</a>
<button onclick="deleteLectureFile(${i})">Löschen</button>`;
}

container.appendChild(div);
});
}

function deleteLectureFile(i){
let stored=JSON.parse(localStorage.getItem("lectureFiles")||"[]");
stored.splice(i,1);
localStorage.setItem("lectureFiles",JSON.stringify(stored));
renderLectureFiles();
}

// ===== NOTIZEN =====
let tempFiles=[];

function openNotes(){
document.getElementById("dashboard").style.display="none";

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Notizen</h2>

<textarea id="noteText"></textarea>
<input type="file" multiple onchange="uploadNoteFiles(event)">
<div id="preview"></div>

<button onclick="saveNote()">Speichern</button>
<button onclick="back()">Zurück</button>
</div>
`;

tempFiles=[];
}

function uploadNoteFiles(e){
for(let f of e.target.files){
let reader=new FileReader();
reader.onload=(ev)=>{
tempFiles.push({name:f.name,data:ev.target.result});
renderPreview();
};
reader.readAsDataURL(f);
}
}

function renderPreview(){
let html="";
tempFiles.forEach((f,i)=>{
html+=`<div class="file-box">${f.name}
<button onclick="tempFiles.splice(${i},1);renderPreview()">✖</button></div>`;
});
document.getElementById("preview").innerHTML=html;
}

function saveNote(){
let notes=JSON.parse(localStorage.getItem("notes")||"[]");
notes.push({text:document.getElementById("noteText").value,files:tempFiles});
localStorage.setItem("notes",JSON.stringify(notes));
back();
}

// ===== TODAY =====
function openToday(){
document.getElementById("dashboard").style.display="none";

let cards=JSON.parse(localStorage.getItem("ankiCards")||"[]");
let due=cards.filter(c=>c.next<=Date.now());

let list=due.map(c=>`<li>${c.q}</li>`).join("");

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Heute lernen</h2>
<ul>${list || "🎉 Nichts fällig"}</ul>
<button onclick="openAnki()">Jetzt lernen</button>
<button onclick="back()">Zurück</button>
</div>
`;
}

// ===== ANKI =====
const defaultCards=[
{q:"Was ist KI?",a:"Maschinen lernen aus Daten",interval:1,ease:2.5,next:Date.now()}
];

if(!localStorage.getItem("ankiCards")){
localStorage.setItem("ankiCards",JSON.stringify(defaultCards));
}

let current=null;

function openAnki(){
document.getElementById("dashboard").style.display="none";

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Anki</h2>

<div id="card"></div>

<button onclick="showAnswer()">Antwort</button><br>

<button onclick="rate('again')">🔴</button>
<button onclick="rate('good')">🟢</button>

<hr>

<h3>Neue Karte</h3>
<input id="q">
<input id="a">
<button onclick="addCard()">Speichern</button>

<button onclick="back()">Zurück</button>
</div>
`;

nextCard();
}

function nextCard(){
let cards=JSON.parse(localStorage.getItem("ankiCards"));
let due=cards.filter(c=>c.next<=Date.now());

if(!due.length){
document.getElementById("card").innerHTML="🎉 Fertig!";
return;
}

current=cards.indexOf(due[0]);
document.getElementById("card").innerHTML=cards[current].q;
}

function showAnswer(){
let cards=JSON.parse(localStorage.getItem("ankiCards"));
document.getElementById("card").innerHTML=
cards[current].q+"<br>"+cards[current].a;
}

function rate(type){
let cards=JSON.parse(localStorage.getItem("ankiCards"));
let c=cards[current];

if(type==="again"){c.interval=1;}
if(type==="good"){c.interval*=c.ease;}

c.next=Date.now()+c.interval*86400000;

localStorage.setItem("ankiCards",JSON.stringify(cards));
nextCard();
}

function addCard(){
let cards=JSON.parse(localStorage.getItem("ankiCards"));
cards.push({
q:document.getElementById("q").value,
a:document.getElementById("a").value,
interval:1,
ease:2.5,
next:Date.now()
});
localStorage.setItem("ankiCards",JSON.stringify(cards));
alert("Gespeichert");
}

// ===== NAV =====
function back(){
document.getElementById("content").innerHTML="";
document.getElementById("dashboard").style.display="flex";
}

</script>

</body>
</html>
