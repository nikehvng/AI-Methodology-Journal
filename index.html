<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Lernplattform</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0d1b2a;
  color:white;
}

.container { width:90%; margin:auto; }

.dashboard {
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
}

.card {
  background:#1a2a4c;
  padding:1rem;
  border-radius:12px;
  flex:1 1 300px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover { transform:scale(1.05); }

.section {
  background:#1a2a4c;
  padding:1rem;
  margin-top:1rem;
  border-radius:12px;
}

button {
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

textarea {
  width:100%;
  height:120px;
  background:#112240;
  color:white;
}

input {
  width:100%;
  margin-top:5px;
  padding:8px;
  border-radius:6px;
  border:none;
}

.lecture-image {
  width:100%;
  max-width:500px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>KI Methoden & Anwendungen</h1>

<div class="dashboard" id="dashboard">

<div class="card">
<h2>Vorlesungen</h2>
<ul>
<li onclick="openLecture()">Warum KI jetzt?</li>
</ul>
</div>

<div class="card" onclick="openToday()">
<h2>Was steht heute an?</h2>
</div>

<div class="card" onclick="openNotes()">
<h2>Notizen</h2>
</div>

<div class="card" onclick="openAnki()">
<h2>Anki</h2>
</div>

<div class="card">
<h2>Fragen</h2>
<button onclick="window.open('https://chat.openai.com','_blank')">
Zu ChatGPT
</button>
</div>

</div>

<div id="content"></div>

</div>

<script>

// ===== VORLESUNG =====
function openLecture(){
document.getElementById("dashboard").style.display="none";

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Warum KI jetzt?</h2>

<p><strong>Einleitung:</strong><br>
⭐️ Künstliche Intelligenz gewinnt immer mehr an Relevanz und Potenzial.</p>

<p><strong>Erklärung:</strong><br>
💡 Sie ist großer Bestandteil der 5 Top Tech Themen.<br><br>
💡 KI wird als eine der wichtigsten Technologien der aktuellen Zeit gesehen. Expertenmeinungen zufolge kann sie unser Leben in vielerlei Hinsicht verändern.<br><br>
💡 Gleichzeitig wird vor Risiken gewarnt.<br><br>
💡 Jobs könnten sich grundlegend verändern.</p>

<p><strong>Merksatz:</strong><br>
⚠️ KI wird unsere Zukunft grundlegend verändern.</p>

<hr>

<h3>Dateien zur Lektion</h3>
<input type="file" multiple onchange="uploadLectureFiles(event)">
<div id="lecturePreview"></div>

<button onclick="back()">Zurück</button>
</div>
`;

renderLectureFiles();
}

// ===== DATEIEN (VORLESUNG – CLEAN VERSION) =====
function uploadLectureFiles(e){
let files = e.target.files;
let stored = JSON.parse(localStorage.getItem("lectureFiles") || "[]");

for(let f of files){
let reader = new FileReader();
reader.onload = function(ev){
stored.push({name:f.name,data:ev.target.result});
localStorage.setItem("lectureFiles", JSON.stringify(stored));
renderLectureFiles();
};
reader.readAsDataURL(f);
}
}

function renderLectureFiles(){
let container = document.getElementById("lecturePreview");
if(!container) return;

container.innerHTML="";
let stored = JSON.parse(localStorage.getItem("lectureFiles") || "[]");

stored.forEach((f,i)=>{
let div = document.createElement("div");

if(f.data.startsWith("data:image")){
div.innerHTML=`
<img src="${f.data}" class="lecture-image">
<button onclick="deleteLectureFile(${i})">Löschen</button>
`;
}else{
div.innerHTML=`
<a href="${f.data}" target="_blank">${f.name}</a>
<button onclick="deleteLectureFile(${i})">Löschen</button>
`;
}

container.appendChild(div);
});
}

function deleteLectureFile(i){
let stored = JSON.parse(localStorage.getItem("lectureFiles") || "[]");
stored.splice(i,1);
localStorage.setItem("lectureFiles", JSON.stringify(stored));
renderLectureFiles();
}

// ===== NOTIZEN =====
let tempFiles=[];

function openNotes(){
document.getElementById("dashboard").style.display="none";

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Notizen</h2>

<textarea id="noteText"></textarea>

<input type="file" multiple onchange="uploadNoteFiles(event)">
<div id="preview"></div>

<button onclick="saveNote()">Speichern</button>
<button onclick="back()">Zurück</button>
</div>
`;

tempFiles=[];
}

function uploadNoteFiles(e){
for(let f of e.target.files){
let reader=new FileReader();
reader.onload=(ev)=>{
tempFiles.push({name:f.name,data:ev.target.result});
renderPreview();
};
reader.readAsDataURL(f);
}
}

function renderPreview(){
let html="";
tempFiles.forEach((f,i)=>{
html+=`<div>${f.name}
<button onclick="tempFiles.splice(${i},1);renderPreview()">✖</button></div>`;
});
document.getElementById("preview").innerHTML=html;
}

function saveNote(){
let notes=JSON.parse(localStorage.getItem("notes")||"[]");
notes.push({text:document.getElementById("noteText").value,files:tempFiles});
localStorage.setItem("notes",JSON.stringify(notes));
back();
}

// ===== TODAY =====
function openToday(){
document.getElementById("dashboard").style.display="none";

let cards=JSON.parse(localStorage.getItem("ankiCards")||"[]");
let due=cards.filter(c=>c.next<=Date.now());

let list=due.map(c=>`<li>${c.q}</li>`).join("");

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Heute wiederholen</h2>
<ul>${list || "🎉 Keine fälligen Themen"}</ul>
<button onclick="openAnki()">Jetzt lernen</button>
<button onclick="back()">Zurück</button>
</div>
`;
}

// ===== ANKI (OPTIMIERT) =====

const defaultCards = [
{
q:"Was ist KI?",
a:"Maschinen lernen aus Daten",
interval:1,
ease:2.5,
next:Date.now()
}
];

// Initialisierung
if(!localStorage.getItem("ankiCards")){
localStorage.setItem("ankiCards", JSON.stringify(defaultCards));
}

let currentIndex = null;
let dueCards = [];

// Öffnen
function openAnki(){
document.getElementById("dashboard").style.display="none";

document.getElementById("content").innerHTML=`
<div class="section">
<h2>Anki</h2>

<p id="progress"></p>

<div id="card"></div>

<button onclick="showAnswer()">Antwort anzeigen</button><br><br>

<button onclick="rateCard('again')">🔴 Again</button>
<button onclick="rateCard('hard')">🟠 Hard</button>
<button onclick="rateCard('good')">🟢 Good</button>
<button onclick="rateCard('easy')">🔵 Easy</button>

<hr>

<h3>Neue Karte</h3>
<input id="q" placeholder="Frage">
<input id="a" placeholder="Antwort">
<button onclick="addCard()">Speichern</button>

<br><br>
<button onclick="back()">Zurück</button>
</div>
`;

loadDueCards();
showNextCard();
}

// Fällige Karten laden
function loadDueCards(){
let cards = JSON.parse(localStorage.getItem("ankiCards"));
let now = Date.now();

dueCards = cards
.map((c,i)=>({...c,index:i}))
.filter(c=>c.next <= now)
.sort((a,b)=>a.next - b.next);
}

// Karte anzeigen
function showNextCard(){
if(dueCards.length === 0){
document.getElementById("card").innerHTML = "🎉 Keine Karten fällig!";
document.getElementById("progress").innerHTML = "";
return;
}

currentIndex = dueCards[0].index;

document.getElementById("card").innerHTML = `
<h3>${dueCards[0].q}</h3>
`;

document.getElementById("progress").innerHTML =
`${dueCards.length} Karten übrig`;
}

// Antwort anzeigen
function showAnswer(){
let cards = JSON.parse(localStorage.getItem("ankiCards"));
let c = cards[currentIndex];

document.getElementById("card").innerHTML = `
<h3>${c.q}</h3>
<p><strong>${c.a}</strong></p>
`;
}

// Bewertungssystem
function rateCard(type){
let cards = JSON.parse(localStorage.getItem("ankiCards"));
let c = cards[currentIndex];

// SM-2 ähnlich
if(type === "again"){
c.interval = 1;
c.ease = Math.max(1.3, c.ease - 0.2);
}

if(type === "hard"){
c.interval *= 1.2;
c.ease = Math.max(1.3, c.ease - 0.15);
}

if(type === "good"){
c.interval *= c.ease;
c.ease += 0.1;
}

if(type === "easy"){
c.interval *= (c.ease + 0.3);
c.ease += 0.15;
}

// nächste Wiederholung
c.next = Date.now() + c.interval * 86400000;

cards[currentIndex] = c;
localStorage.setItem("ankiCards", JSON.stringify(cards));

// nächste Karte
loadDueCards();
showNextCard();
}

// Neue Karte hinzufügen
function addCard(){
let q = document.getElementById("q").value;
let a = document.getElementById("a").value;

if(!q || !a){
alert("Bitte ausfüllen!");
return;
}

let cards = JSON.parse(localStorage.getItem("ankiCards"));

cards.push({
q:q,
a:a,
interval:1,
ease:2.5,
next:Date.now()
});

localStorage.setItem("ankiCards", JSON.stringify(cards));

document.getElementById("q").value="";
document.getElementById("a").value="";

alert("Karte gespeichert!");
}
  
// ===== NAV =====
function back(){
document.getElementById("content").innerHTML="";
document.getElementById("dashboard").style.display="flex";
}

</script>

</body>
</html>
